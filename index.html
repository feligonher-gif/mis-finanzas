          <div style="margin-top:12px;background:var(--s2);border-radius:12px;padding:14px;margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;font-weight:700">
              <span>Total a importar</span>
              <span style="color:var(--r)">${clp(preview.filter(it=>selected[it.id]).reduce((s,it)=>s+it.amount,0))}</span>
            </div>
            <div style="font-size:12px;color:var(--t3);margin-top:4px">${Object.values(selected).filter(Boolean).length} de ${preview.length} gastos</div>
          </div>

            <button class="btn bs bfull" onClick=${()=>setStep('map')}>← Columnas</button>

          </div>
        `}
        ${step==='done'&&html`
          <div class="empty" style="height:60vh">
            <div style="font-size:72px">✅</div>
            <b style="font-size:22px">¡Importado!</b>

// ── PIN Lock ──────────────────────────────────────────────────────────────────
function PINLock({onUnlock,storedPin}) {
  const [pin,setPin] = useState('')
  const [err,setErr] = useState(false)
  function key(k){
    if(k==='del'){setPin(p=>p.slice(0,-1));setErr(false);return}
    if(pin.length>=4)return
    const next=pin+k
    setPin(next)
    if(next.length===4){
      if(next===storedPin)onUnlock()
      else{setTimeout(()=>{setPin('');setErr(true)},200)}
    }
  }
  return html`
    <div class="pinscreen">
      <svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#007AFF"/><stop offset="1" stop-color="#5856D6"/></linearGradient></defs><rect width="64" height="64" rx="14" fill="url(#lg)"/><rect x="9" y="37" width="9" height="18" rx="2.5" fill="rgba(255,255,255,.5)"/><rect x="22" y="26" width="9" height="29" rx="2.5" fill="rgba(255,255,255,.75)"/><rect x="35" y="17" width="9" height="38" rx="2.5" fill="#fff"/><rect x="48" y="9" width="6" height="46" rx="2.5" fill="#34C759"/><polyline points="13,31 26,21 40,13 51,7" fill="none" stroke="#FFD60A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="51" cy="7" r="3" fill="#FFD60A"/></svg>
      <div style="font-weight:800;font-size:24px">Mis Finanzas</div>
      <div style="color:var(--t3)">Ingresa tu PIN para acceder</div>
      <div class="pindots" style="animation:${err?'shake .3s':'none'}">
        ${[0,1,2,3].map(i=>html`<div class="pindot ${pin.length>i?'f':''}" style="${err?'border-color:var(--r)':''};${err&&pin.length>i?'background:var(--r)':''}"></div>`)}
      </div>
      ${err?html`<div style="color:var(--r);font-weight:600">PIN incorrecto</div>`:''}
      <div class="pinpad">
        ${['1','2','3','4','5','6','7','8','9','','0','del'].map((k,i)=>k===''?html`<div></div>`:html`<button class="pkey" onClick=${()=>key(k)}>${k==='del'?'⌫':k}</button>`)}
      </div>
    </div>`
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function Nav() {
  const {state,dispatch} = useApp()
  const TABS=[['dashboard','🏠','Inicio'],['ingresos','💰','Ingresos'],['gastos','💸','Gastos'],['compromisos','💳','Deudas'],['metas','🎯','Metas'],['mas','⋯','Más']]
  return html`
    <nav class="bnav">
      ${TABS.map(([id,ic,lb])=>html`
        <button class="ni ${state.tab===id?'on':''}" onClick=${()=>dispatch({type:'TAB',p:id})}>
          <span>${ic}</span><span>${lb}</span>
        </button>`)}
    </nav>`
}

// ── App ───────────────────────────────────────────────────────────────────────
function AppContent() {
  const {state} = useApp()
  const {tab,subpage} = state
  if(subpage==='simulador') return html`<${Simulador}/>`
  if(subpage==='especiales') return html`<${GastosEsp}/>`
  if(subpage==='calendario') return html`<${Calendario}/>`
  if(subpage==='reportes') return html`<${Reportes}/>`
  if(subpage==='configuracion') return html`<${Configuracion}/>`
  if(subpage==='estadocuenta') return html`<${EstadoCuenta}/>`
  if(subpage==='importarexcel') return html`<${ImportarExcel}/>`
  if(tab==='ingresos') return html`<${Ingresos}/>`
  if(tab==='gastos') return html`<${Gastos}/>`
  if(tab==='compromisos') return html`<${Compromisos}/>`
  if(tab==='metas') return html`<${Metas}/>`
  if(tab==='mas') return html`<${Mas}/>`
  return html`<${Dashboard}/>`
}

function App() {
  const {state} = useApp()
  const [unlocked,setUnlocked] = useState(false)
  if(state.loading) return html`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:16px">
      <svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#007AFF"/><stop offset="1" stop-color="#5856D6"/></linearGradient></defs><rect width="64" height="64" rx="14" fill="url(#lg)"/><rect x="9" y="37" width="9" height="18" rx="2.5" fill="rgba(255,255,255,.5)"/><rect x="22" y="26" width="9" height="29" rx="2.5" fill="rgba(255,255,255,.75)"/><rect x="35" y="17" width="9" height="38" rx="2.5" fill="#fff"/><rect x="48" y="9" width="6" height="46" rx="2.5" fill="#34C759"/><polyline points="13,31 26,21 40,13 51,7" fill="none" stroke="#FFD60A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="51" cy="7" r="3" fill="#FFD60A"/></svg>
      <div style="font-weight:700;font-size:20px">Mis Finanzas</div>
      <div style="color:var(--t3)">Cargando…</div>
    </div>`
  if(state.settings.pin&&!unlocked) return html`<${PINLock} storedPin=${state.settings.pin} onUnlock=${()=>setUnlocked(true)}/>`
  return html`
    <div id="shell" style="height:100dvh;overflow:hidden;display:flex;flex-direction:column">
      <div style="flex:1;overflow:hidden;display:flex;flex-direction:column"><${AppContent}/></div>
      <${Nav}/>
    </div>`
}

render(html`<${Provider}><${App}/></${Provider}>`, document.getElementById('app'))

</script>

  })
