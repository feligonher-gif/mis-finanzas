<script>
// ── Globals (UMD) ────────────────────────────────────────────────────────────
const { h, render, createContext } = preact
const { useState, useEffect, useRef, useContext, useReducer, useMemo, useCallback } = preactHooks
const html = htm.bind(h)
// Register all Chart.js components from UMD global
if (typeof Chart !== 'undefined' && Chart.registerables) Chart.register(...Chart.registerables)

// ── DB ───────────────────────────────────────────────────────────────────────
// Minimal promise wrapper around raw IndexedDB (no idb dependency)
function idbOpen(name, version, upgrade) {
  return new Promise((res, rej) => {
    const req = indexedDB.open(name, version)
    req.onupgradeneeded = e => upgrade(e.target.result, e.oldVersion)
    req.onsuccess = e => res(e.target.result)
    req.onerror = e => rej(e.target.error)
  })
}
function idbTx(db, stores, mode, fn) {
  return new Promise((res, rej) => {
    const tx = db.transaction(stores, mode)
    tx.onerror = e => rej(e.target.error)
    const result = fn(tx)
    tx.oncomplete = () => res(result)
    if (result && typeof result.then === 'function') result.then(v => res(v)).catch(rej)
  })
}
function idbReq(req) { return new Promise((res, rej) => { req.onsuccess = e => res(e.target.result); req.onerror = e => rej(e.target.error) }) }

let _db
async function getDB() {
  if (_db) return _db
  _db = await idbOpen('mis-finanzas', 1, (db) => {
    ['incomes','expenses','goals','debts','installments','specials'].forEach(s => {
      const st = db.createObjectStore(s, { keyPath: 'id' })
      if (['incomes','expenses','specials'].includes(s)) st.createIndex('by-date','date')
    })
    db.createObjectStore('settings')
  })
  return _db
}

const DEFAULT_SETTINGS = { theme:'system', pin:'', monthlyGoalPct:20 }
const DB = {
  async getAll(store) {
    const db = await getDB()
    return idbReq(db.transaction(store,'readonly').objectStore(store).getAll())
  },
  async put(store, item) {
    const db = await getDB()
    return idbReq(db.transaction(store,'readwrite').objectStore(store).put(item))
  },
  async del(store, id) {
    const db = await getDB()
    return idbReq(db.transaction(store,'readwrite').objectStore(store).delete(id))
  },
  async getSettings() {
    const db = await getDB()
    const val = await idbReq(db.transaction('settings','readonly').objectStore('settings').get('main'))
    return val ?? DEFAULT_SETTINGS
  },
  async saveSettings(s) {
    const db = await getDB()
    return idbReq(db.transaction('settings','readwrite').objectStore('settings').put(s,'main'))
  },
  async exportAll() {
    const [incomes,expenses,goals,debts,installments,specials,settings] = await Promise.all([
      DB.getAll('incomes'),DB.getAll('expenses'),DB.getAll('goals'),
      DB.getAll('debts'),DB.getAll('installments'),DB.getAll('specials'),
      DB.getSettings()
    ])
    return { incomes,expenses,goals,debts,installments,specials,settings, exportedAt: new Date().toISOString() }
  },
  async importAll(data) {
    const db = await getDB()
    const stores = ['incomes','expenses','goals','debts','installments','specials']
    const tx = db.transaction([...stores,'settings'],'readwrite')
    const reqs = [
      ...stores.flatMap(s => (data[s]||[]).map(i => tx.objectStore(s).put(i))),
      tx.objectStore('settings').put(data.settings??DEFAULT_SETTINGS,'main')
    ]
    await new Promise((res,rej) => { tx.oncomplete=res; tx.onerror=e=>rej(e.target.error) })
  }
}

// ── Utilities ────────────────────────────────────────────────────────────────
const $ = (v,fallback='') => v ?? fallback
const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2,9)}`
const todayISO = () => { const d=new Date(); return `${d.getFullYear()}-${s2(d.getMonth()+1)}-${s2(d.getDate())}` }
const s2 = n => String(n).padStart(2,'0')
const clp = n => new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',minimumFractionDigits:0}).format(Math.round(n||0))
const fdate = iso => { const [y,m,d]=iso.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'}) }
const fmonth = ym => { const [y,m]=ym.split('-'); return new Date(+y,+m-1,1).toLocaleDateString('es-CL',{month:'long',year:'numeric'}) }
const inMonth = (date,ym) => date?.startsWith(ym)
const curMonth = () => { const d=new Date(); return `${d.getFullYear()}-${s2(d.getMonth()+1)}` }
const pct = (v,t) => t===0?0:Math.min(100,Math.round(v/t*100))
const last6 = () => { const ms=[]; const n=new Date(); for(let i=5;i>=0;i--){ const d=new Date(n.getFullYear(),n.getMonth()-i,1); ms.push(`${d.getFullYear()}-${s2(d.getMonth()+1)}`)} return ms }
const next6 = () => { const ms=[]; const n=new Date(); for(let i=0;i<6;i++){ const d=new Date(n.getFullYear(),n.getMonth()+i,1); ms.push(`${d.getFullYear()}-${s2(d.getMonth()+1)}`)} return ms }

const ILABELS = {sueldo:'💼 Sueldo',adicional:'➕ Adicional',bono:'🎁 Bono',freelance:'💻 Freelance',arriendo:'🏠 Arriendo',otro:'💵 Otro'}
const ELABELS = {vivienda:'🏠 Vivienda',alimentacion:'🍽 Alimentación',transporte:'🚌 Transporte',salud:'💊 Salud',educacion:'📚 Educación',entretenimiento:'🎬 Entret.',ropa:'👗 Ropa',servicios:'⚡ Servicios',vehiculo:'🚗 Vehículo',mascotas:'🐾 Mascotas',hormiga:'☕ Hormiga',metas:'🎯 Metas',otro:'📦 Otro'}
const ETLABELS = {fijo:'📌 Fijo',variable:'📊 Variable',hormiga:'🐜 Hormiga'}
const DTLABELS = {tarjeta:'💳 Tarjeta',credito_consumo:'🏦 Consumo',prestamo:'🤝 Préstamo',hipoteca:'🏠 Hipoteca',otro:'📋 Otro'}
const SCLABELS = {vehiculo:'🚗 Vehículo',moto:'🏍️ Moto',hidrogeno:'⚡ Hidrógeno',salud:'💊 Salud',educacion:'📚 Educación',hogar:'🏠 Hogar',viaje:'✈️ Viaje',otro:'📋 Otro'}
const SC_TO_CAT = {vehiculo:'transporte',moto:'transporte',hidrogeno:'servicios',salud:'salud',educacion:'educacion',hogar:'hogar',viaje:'transporte',otro:'otros'}
const COLORS = ['#007AFF','#34C759','#FF9500','#FF3B30','#AF52DE','#5AC8FA','#FF2D55','#FFCC00','#30D158','#64D2FF']
const GICONS = ['🎯','🏠','✈️','🚗','📱','💻','🎓','💍','🏖️','🐾','🏋️','🎸','💰','⚡','🌊']
const GCOLS = ['#007AFF','#34C759','#FF9500','#FF3B30','#AF52DE','#5856D6','#FF2D55','#5AC8FA','#FFCC00','#FF6B35','#30B0C7']

// ── Context & State ──────────────────────────────────────────────────────────
const Ctx = createContext(null)
const initState = {
  incomes:[], expenses:[], goals:[], debts:[], installments:[], specials:[],
  settings: DEFAULT_SETTINGS, loading:true,
  tab:'dashboard', subpage:null, month: curMonth()
}

function reducer(s, a) {
  switch(a.type) {
    case 'LOAD': return {...s,...a.p,loading:false}
    case 'TAB': return {...s,tab:a.p,subpage:null}
    case 'SUB': return {...s,subpage:a.p}
    case 'MONTH': return {...s,month:a.p}
    case 'ADD_I': return {...s,incomes:[...s.incomes,a.p]}
    case 'UPD_I': return {...s,incomes:s.incomes.map(x=>x.id===a.p.id?a.p:x)}
    case 'DEL_I': return {...s,incomes:s.incomes.filter(x=>x.id!==a.p)}
    case 'ADD_E': return {...s,expenses:[...s.expenses,a.p]}
    case 'UPD_E': return {...s,expenses:s.expenses.map(x=>x.id===a.p.id?a.p:x)}
    case 'DEL_E': return {...s,expenses:s.expenses.filter(x=>x.id!==a.p)}
    case 'ADD_G': return {...s,goals:[...s.goals,a.p]}
    case 'UPD_G': return {...s,goals:s.goals.map(x=>x.id===a.p.id?a.p:x)}
    case 'DEL_G': return {...s,goals:s.goals.filter(x=>x.id!==a.p)}
    case 'ADD_D': return {...s,debts:[...s.debts,a.p]}
    case 'UPD_D': return {...s,debts:s.debts.map(x=>x.id===a.p.id?a.p:x)}
    case 'DEL_D': return {...s,debts:s.debts.filter(x=>x.id!==a.p)}
    case 'ADD_N': return {...s,installments:[...s.installments,a.p]}
    case 'UPD_N': return {...s,installments:s.installments.map(x=>x.id===a.p.id?a.p:x)}
    case 'DEL_N': return {...s,installments:s.installments.filter(x=>x.id!==a.p)}
    case 'ADD_S': return {...s,specials:[...s.specials,a.p]}
    case 'UPD_S': return {...s,specials:s.specials.map(x=>x.id===a.p.id?a.p:x)}
    case 'DEL_S': return {...s,specials:s.specials.filter(x=>x.id!==a.p)}
    case 'SETTINGS': return {...s,settings:{...s.settings,...a.p}}
    default: return s
  }
}

function Provider({children}) {
  const [state,dispatch] = useReducer(reducer,initState)
  useEffect(()=>{
    (async()=>{
      const [incomes,expenses,goals,debts,installments,specials,settings] = await Promise.all([
        DB.getAll('incomes'),DB.getAll('expenses'),DB.getAll('goals'),
        DB.getAll('debts'),DB.getAll('installments'),DB.getAll('specials'),
        DB.getSettings()
      ])
      const loaded={incomes,expenses,goals,debts,installments,specials,settings}
      dispatch({type:'LOAD',p:loaded})
      dispararNotifHoy(loaded)
    })()
  },[])
  useEffect(()=>{
    const {theme}=state.settings
    const dark = theme==='dark'||(theme==='system'&&matchMedia('(prefers-color-scheme:dark)').matches)
    document.documentElement.setAttribute('data-theme',dark?'dark':'light')
  },[state.settings.theme])
  const saveSetting = useCallback(async p=>{
    const upd={...state.settings,...p}
    dispatch({type:'SETTINGS',p})
    await DB.saveSettings(upd)
  },[state.settings])
  return html`<${Ctx.Provider} value=${{state,dispatch,saveSetting}}>${children}</${Ctx.Provider}>`
}
const useApp = () => useContext(Ctx)

function Modal({open,onClose,title,children}) {
  useEffect(()=>{ document.body.style.overflow=open?'hidden':'' },[open])
  if(!open) return null
  return html`
    <div class="overlay" onClick=${e=>e.target===e.currentTarget&&onClose()}>
      <div class="sheet">
        <div class="shandle"></div>
        <div class="shdr">
          <span class="stitle">${title}</span>
          <button class="btn bgh bsm" onClick=${onClose}>Cerrar</button>
        </div>
        <div class="sbody">${children}</div>
      </div>
    </div>`
}

function MonthNav({value,onChange}) {
  function shift(d) {
    const [y,m]=value.split('-').map(Number)
    const dt=new Date(y,m-1+d,1)
    onChange(`${dt.getFullYear()}-${s2(dt.getMonth()+1)}`)
  }
  return html`
    <div class="msel">
      <button class="btn bs bsm" style="width:36px;height:36px;padding:0;border-radius:50%" onClick=${()=>shift(-1)}>‹</button>
      <span class="msel-l">${fmonth(value)}</span>
      <button class="btn bs bsm" style="width:36px;height:36px;padding:0;border-radius:50%" onClick=${()=>shift(1)}>›</button>
    </div>`
}

  const mi2 = useMemo(()=>installments.filter(i=>i.paidInstallments<i.numInstallments).reduce((s,i)=>s+i.monthlyAmount,0),[installments])
  const md = useMemo(()=>debts.reduce((s,d)=>s+d.monthlyPayment,0),[debts])
  const avail = mi - me - mi2 - md

    const allMonths=[...new Set([...incomes.map(i=>i.date.slice(0,7)),...expenses.map(e=>e.date.slice(0,7))].filter(m=>m<=month))].sort()
    return allMonths.reduce((total,m)=>{

      const gst=expenses.filter(e=>inMonth(e.date,m)).reduce((s,e)=>s+e.amount,0)

    })

          <div class="htitle">💼 Mis Finanzas</div>
          <div class="hsub">Resumen financiero</div>
        </div>
        ${alerts>0&&html`<button class="btn bsm br2" style="cursor:pointer" onClick=${()=>dispatch({type:'TAB',p:'compromisos'})}>⚠️ ${alerts} pago${alerts>1?'s':''}</button>`}
      </div>

        <div class="card" style="margin-top:14px;background:${avail>=0?'linear-gradient(135deg,#007AFF,#5856D6)':'linear-gradient(135deg,#FF3B30,#FF2D55)'};color:#fff">

            <div><div style="font-size:10px;opacity:.8">AHORRO</div><div style="font-size:15px;font-weight:700">${sp}%</div></div>
            <div><div style="font-size:10px;opacity:.8">COMPROMETIDO</div><div style="font-size:15px;font-weight:700">${clp(me+mi2+md)}</div></div>

        </div>
        ${goals.length>0&&(()=>{const totalAh=goals.reduce((s,g)=>s+g.currentAmount,0);const totalObj=goals.reduce((s,g)=>s+g.targetAmount,0);return html`

              </div>
              <div style="text-align:right">
                <div style="font-size:32px;font-weight:900">${pct(totalAh,totalObj)}%</div>
                <button class="btn bsm" style="background:rgba(255,255,255,.25);color:#fff;margin-top:6px" onClick=${()=>dispatch({type:'TAB',p:'metas'})}>Ver metas</button>

        ${expByCat.length>0&&html`

function IncomeForm({initial,onSave}) {
  const [cat,setCat] = useState(initial?.category??'sueldo')

    const a=parseFloat(amt)||0; if(!a||!desc) return
    const base={category:cat,amount:a,description:desc,notes:notes||undefined,createdAt:new Date().toISOString()}
    if(initial){onSave({id:initial.id,...base,date});return}
    const d=new Date(date+'T12:00:00')
    const items=[]
    for(let i=0;i<mesesN;i++){
      const nd=new Date(d.getFullYear(),d.getMonth()+i,d.getDate())
      items.push({id:uid(),...base,date:`${nd.getFullYear()}-${s2(nd.getMonth()+1)}-${s2(nd.getDate())}`})

    onSave(mesesN>1?items:items[0])

      <div class="pills">${['1','2','3','6','12'].map(v=>html`<button class="pill ${meses===v?'on':''}" onClick=${()=>setMeses(v)}>${v==='1'?'Solo este mes':v+' meses'}</button>`)}</div>
      ${mesesN>1&&html`<div style="font-size:12px;color:var(--t3);margin-top:6px">Se registrará en ${mesesN} meses consecutivos desde la fecha indicada</div>`}

function Metas() {
  const {state,dispatch} = useApp()
  const [open,setOpen] = useState(false)
  const [editing,setEdit] = useState(null)
  const [addFunds,setAF] = useState(null)
  const [fundsAmt,setFA] = useState('')
  async function save(g){await DB.put('goals',g);dispatch({type:editing?'UPD_G':'ADD_G',p:g});setOpen(false);setEdit(null)}
  async function del(id){if(!confirm('¿Eliminar meta?'))return;await DB.del('goals',id);dispatch({type:'DEL_G',p:id})}
  async function addF(g,amt){
    const u={...g,currentAmount:Math.min(g.currentAmount+amt,g.targetAmount)};
    await DB.put('goals',u);dispatch({type:'UPD_G',p:u});
    const exp={id:uid(),category:'metas',amount:amt,description:`Aporte ${g.icon} ${g.name}`,date:todayISO(),createdAt:new Date().toISOString()};
    await DB.put('expenses',exp);dispatch({type:'ADD_E',p:exp});
  }
  return html`
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="hdr">
        <div><div class="htitle">🎯 Metas</div></div>
        <button class="btn bp bsm" onClick=${()=>{setEdit(null);setOpen(true)}}>+ Nueva</button>
      </div>
      <div class="page">
        ${state.goals.length===0?html`
          <div class="empty"><div style="font-size:48px">🎯</div><b style="font-size:18px">Sin metas de ahorro</b>
            <span style="color:var(--t3)">Define objetivos y monitorea tu progreso</span>
            <button class="btn bp" onClick=${()=>setOpen(true)}>+ Crear primera meta</button>
          </div>`:
          state.goals.map(g=>{
            const pr=pct(g.currentAmount,g.targetAmount)
            const t=new Date(g.targetDate),n=new Date()
            const months=Math.max(0,(t.getFullYear()-n.getFullYear())*12+(t.getMonth()-n.getMonth()))
            const needed=months>0?(g.targetAmount-g.currentAmount)/months:0
            const done=g.currentAmount>=g.targetAmount
            return html`
              <div class="card" style="margin-bottom:12px;border-left:4px solid ${g.color}">
                <div style="display:flex;align-items:center;gap:10px">
                  <span style="font-size:32px">${g.icon}</span>
                  <div style="flex:1">
                    <div style="display:flex;justify-content:space-between;align-items:center">
                      <b style="font-size:17px">${g.name}</b>
                      <div style="display:flex;gap:6px">
                        <button class="btn bico" style="width:30px;height:30px;font-size:12px" onClick=${()=>{setEdit(g);setOpen(true)}}>✏️</button>
                        <button class="btn bico" style="width:30px;height:30px;font-size:12px;background:var(--rl);color:var(--r)" onClick=${()=>del(g.id)}>🗑</button>
                      </div>
                    </div>
                    <div style="display:flex;justify-content:space-between;margin-top:8px">
                      <span style="font-size:13px">${clp(g.currentAmount)}</span>
                      <span style="font-weight:700;color:${g.color}">${pr}%</span>
                      <span style="font-size:13px;color:var(--t3)">${clp(g.targetAmount)}</span>
                    </div>
                    <div class="pwrap"><div class="pbar" style="width:${pr}%;background:${g.color}"></div></div>
                    <div style="display:flex;justify-content:space-between;margin-top:8px">
                      ${done?html`<span class="badge bg2">✓ Meta cumplida</span>`:html`
                        <div style="font-size:12px"><div style="color:var(--t3)">Fecha objetivo</div><b>${t.toLocaleDateString('es-CL',{month:'short',year:'numeric'})}</b>${months>0?html` <span style="color:var(--t3)">(${months} meses)</span>`:''}</div>
                        ${needed>0?html`<div style="font-size:12px;text-align:right"><div style="color:var(--t3)">Necesitas/mes</div><b style="color:var(--o)">${clp(needed)}</b></div>`:''}`}
                    </div>
                    ${!done?html`<button class="btn bg bfull bsm" style="margin-top:10px" onClick=${()=>{setAF(g);setFA('')}}>+ Agregar fondos</button>`:''}
                  </div>
                </div>
              </div>`
          })}
      </div>
      <${Modal} open=${open} onClose=${()=>{setOpen(false);setEdit(null)}} title=${editing?'Editar meta':'Nueva meta'}>
        <${GoalForm} initial=${editing} onSave=${save}/>
      </${Modal}>
      <${Modal} open=${!!addFunds} onClose=${()=>setAF(null)} title="Agregar fondos">
        ${addFunds&&html`
          <div style="text-align:center;margin-bottom:16px"><div style="font-size:48px">${addFunds.icon}</div><b style="font-size:18px">${addFunds.name}</b><br/><span style="color:var(--t3)">${clp(addFunds.currentAmount)} de ${clp(addFunds.targetAmount)}</span></div>
          <div class="fg"><label class="fl">Monto a agregar</label><div class="awrap"><span class="apfx">$</span><input class="inp ainp" type="number" inputmode="numeric" placeholder="0" value=${fundsAmt} onInput=${e=>setFA(e.target.value)}/></div></div>
          <button class="btn bg bfull" onClick=${()=>{const a=parseFloat(fundsAmt)||0;if(a>0){addF(addFunds,a);setAF(null)}}}>💰 Agregar fondos</button>`}
      </${Modal}>
    </div>`
}

function DebtForm({initial,onSave}) {
  const [type,setType] = useState(initial?.type??'tarjeta')

  const [total,setTotal] = useState(initial?.totalAmount?String(initial.totalAmount):'')
  const [bal,setBal] = useState(initial?.currentBalance?String(initial.currentBalance):'')
  const [mp,setMp] = useState(initial?.monthlyPayment?String(initial.monthlyPayment):'')
  const [rate,setRate] = useState(initial?.interestRate?String(initial.interestRate):'')
  const [npd,setNpd] = useState(initial?.nextPaymentDate??todayISO())
  const [cuotasTotal,setCuotasTotal] = useState(initial?.cuotasTotal?String(initial.cuotasTotal):'')
  const [cuotasPagadas,setCuotasPagadas] = useState(initial?.cuotasPagadas?String(initial.cuotasPagadas):'')
  const cuotasRestantes = useMemo(()=>{const t=parseInt(cuotasTotal)||0,p=parseInt(cuotasPagadas)||0;return t>0?Math.max(0,t-p):null},[cuotasTotal,cuotasPagadas])
  function save(){
    const ta=parseFloat(total)||0,cb=parseFloat(bal)||ta,mpa=parseFloat(mp)||0

  }
  return html`
    <div class="fg"><label class="fl">Tipo</label>
      <div class="pills">${Object.entries(DTLABELS).map(([v,l])=>html`<button class="pill ${type===v?'on':''}" onClick=${()=>setType(v)}>${l}</button>`)}</div>
    </div>

      <div class="fg"><label class="fl">Monto total</label><div class="awrap"><span class="apfx">$</span><input class="inp ainp" type="number" inputmode="numeric" placeholder="0" value=${total} onInput=${e=>setTotal(e.target.value)}/></div></div>
      <div class="fg"><label class="fl">Saldo actual</label><div class="awrap"><span class="apfx">$</span><input class="inp ainp" type="number" inputmode="numeric" placeholder="0" value=${bal} onInput=${e=>setBal(e.target.value)}/></div></div>
    </div>
    <div class="row2">
      <div class="fg"><label class="fl">Cuota mensual</label><div class="awrap"><span class="apfx">$</span><input class="inp ainp" type="number" inputmode="numeric" placeholder="0" value=${mp} onInput=${e=>setMp(e.target.value)}/></div></div>

    </div>
    <div class="row2">
      <div class="fg"><label class="fl">N° cuotas totales</label><input class="inp" type="number" inputmode="numeric" placeholder="Ej: 24" value=${cuotasTotal} onInput=${e=>setCuotasTotal(e.target.value)}/></div>
      <div class="fg"><label class="fl">Cuotas pagadas</label><input class="inp" type="number" inputmode="numeric" placeholder="0" value=${cuotasPagadas} onInput=${e=>setCuotasPagadas(e.target.value)}/></div>
    </div>
    ${cuotasRestantes!==null&&html`<div style="background:var(--ol);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-weight:700;color:var(--o)">📅 Cuotas restantes: ${cuotasRestantes} (${cuotasRestantes} meses aprox.)</div>`}

}

function Compromisos() {
  const {state,dispatch} = useApp()

  const [dOpen,setDOpen] = useState(false)
  const [nOpen,setNOpen] = useState(false)
  const [editD,setEditD] = useState(null)
  const [editN,setEditN] = useState(null)
  async function saveD(d){await DB.put('debts',d);dispatch({type:editD?'UPD_D':'ADD_D',p:d});setDOpen(false);setEditD(null)}
  async function delD(id){if(!confirm('¿Eliminar?'))return;await DB.del('debts',id);dispatch({type:'DEL_D',p:id})}
  async function saveN(n){await DB.put('installments',n);dispatch({type:editN?'UPD_N':'ADD_N',p:n});setNOpen(false);setEditN(null)}
  async function delN(id){if(!confirm('¿Eliminar?'))return;await DB.del('installments',id);dispatch({type:'DEL_N',p:id})}
  async function payN(inst){const u={...inst,paidInstallments:Math.min(inst.paidInstallments+1,inst.numInstallments)};await DB.put('installments',u);dispatch({type:'UPD_N',p:u})}
  const td=state.debts.reduce((s,d)=>s+d.currentBalance,0)
  const tmd=state.debts.reduce((s,d)=>s+d.monthlyPayment,0)
  const tmi=state.installments.filter(i=>i.paidInstallments<i.numInstallments).reduce((s,i)=>s+i.monthlyAmount,0)

  const alerts=state.debts.filter(d=>{const dd=new Date(d.nextPaymentDate),diff=(dd-today)/864e5;return diff>=0&&diff<=7})

  return html`
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="hdr"><div class="htitle">💳 Compromisos</div></div>
      <div class="page">
        <div class="grid2">
          ${[['Deuda total',clp(td),'r'],['Pagos/mes',clp(tmd+tmi),'o']].map(([l,v,c])=>html`<div class="card"><div class="slbl">${l}</div><div class="sval ${c}">${v}</div></div>`)}

        </div>
        ${sub==='deudas'?html`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px">
            <div class="slabel" style="margin:0">Mis deudas</div>
            <button class="btn bp bsm" onClick=${()=>{setEditD(null);setDOpen(true)}}>+ Agregar</button>

                  ${[['Saldo',clp(d.currentBalance),'r'],['Cuota/mes',clp(d.monthlyPayment),'o'],['Tasa',d.interestRate+'%',''],['Próximo pago',due.toLocaleDateString('es-CL'),urg?'r':'']].map(([l,v,c])=>html`
                    <div><div style="font-size:11px;color:var(--t3)">${l}</div><div style="font-weight:700;color:${c?'var(--'+c+')':'var(--t)'}">${v}${urg&&l==='Próximo pago'?' ⚠️':''}</div></div>`)}
                </div>
                ${d.cuotasTotal&&html`
                  <div style="margin-top:10px">
                    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
                      <span style="color:var(--t3)">${d.cuotasPagadas||0} de ${d.cuotasTotal} cuotas pagadas</span>
                      <span style="font-weight:700;color:var(--o)">${Math.max(0,d.cuotasTotal-(d.cuotasPagadas||0))} restantes</span>
                    </div>

          ${tmi>0&&html`<div class="card" style="margin-top:10px;background:var(--ol);border:1.5px solid var(--o)"><div style="font-weight:700;color:var(--o)">💳 Comprometido este mes</div><div style="font-size:28px;font-weight:900;color:var(--o)">${clp(tmi)}</div></div>`}
          ${state.installments.length===0?html`<div class="empty"><div style="font-size:48px">📦</div><b>Sin compras en cuotas</b><button class="btn bp" onClick=${()=>setNOpen(true)}>+ Agregar compra</button></div>`:
          state.installments.map(inst=>{

            return html`
              <div class="card" style="margin-top:10px;opacity:${done?.6:1}" onClick=${()=>{setEditN(inst);setNOpen(true)}}>

                  </div>

                <div style="margin-top:10px">
                  <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
                    <span style="color:var(--t3)">${inst.paidInstallments} de ${inst.numInstallments} cuotas</span>
                    <span style="font-weight:700;color:${done?'var(--g)':'var(--o)'}">${done?'✓ Pagado':`${pend} pendiente${pend!==1?'s':''}`}</span>
                  </div>
                  <div class="pwrap"><div class="pbar" style="width:${inst.paidInstallments/inst.numInstallments*100}%;background:${done?'var(--g)':'var(--a)'}"></div></div>
                </div>
                <div class="grid2" style="margin-top:10px">
                  ${[['Cuota',clp(inst.monthlyAmount)],['Total',clp(inst.totalPrice)],['Pagado',clp(inst.paidInstallments*inst.monthlyAmount)],['Término',end.toLocaleDateString('es-CL',{month:'short',year:'numeric'})]].map(([l,v])=>html`
                    <div><div style="font-size:11px;color:var(--t3)">${l}</div><div style="font-weight:600">${v}</div></div>`)}
                </div>

      </${Modal}>
      <${Modal} open=${nOpen} onClose=${()=>{setNOpen(false);setEditN(null)}} title=${editN?'Editar compra':'Nueva compra en cuotas'}>
        <${InstForm} initial=${editN} onSave=${saveN}/>
      </${Modal}>
    </div>`
}

// ── Simulador ────────────────────────────────────────────────────────────────
function Simulador() {
  const {state,dispatch} = useApp()
  const [price,setPrice] = useState('')
  const [inst,setInst] = useState('1')
  const [rate,setRate] = useState('0')
  const [desc,setDescS] = useState('')
  const [done,setDone] = useState(false)
  const projRef=useRef(null),projC=useRef(null)
  const cm=curMonth()
  const mi=useMemo(()=>state.incomes.filter(i=>inMonth(i.date,cm)).reduce((s,i)=>s+i.amount,0),[state.incomes])
  const me=useMemo(()=>state.expenses.filter(e=>inMonth(e.date,cm)).reduce((s,e)=>s+e.amount,0),[state.expenses])
  const mn=useMemo(()=>state.installments.filter(i=>i.paidInstallments<i.numInstallments).reduce((s,i)=>s+i.monthlyAmount,0),[state.installments])
  const md=useMemo(()=>state.debts.reduce((s,d)=>s+d.monthlyPayment,0),[state.debts])
  const avail=mi-me-mn-md
  const p=parseFloat(price)||0,n=parseInt(inst)||1,r=parseFloat(rate)||0
  const mr=r/100/12
  const mp=n===1?p:mr===0?p/n:p*(mr*Math.pow(1+mr,n))/(Math.pow(1+mr,n)-1)
  const totalPagar=n===1?p:mp*n
  const intereses=totalPagar-p
  const newAvail=avail-mp
  const impPct=mi>0?Math.round(mp/mi*100):0
  const verdict=!done||!p?null:newAvail<0?'bad':impPct>30||newAvail<mi*.1?'warn':'ok'
  const VD={ok:{e:'✅',t:'¡Sí puedes comprarlo!',d:'Esta compra es manejable con tus finanzas actuales.',c:'var(--g)'},warn:{e:'⚠️',t:'Con precaución',d:'Puedes comprarlo pero comprometerá un porcentaje alto de tus ingresos.',c:'var(--o)'},bad:{e:'❌',t:'No es recomendable',d:'Esta compra superaría tu capacidad de pago mensual.',c:'var(--r)'}}

  // Proyección mes a mes con datos reales de cada mes futuro
  const proj=useMemo(()=>{
    if(!done||!p) return []
    const meses=Math.max(n,6)
    const now=new Date()
    return Array.from({length:meses},(_,i)=>{
      const d=new Date(now.getFullYear(),now.getMonth()+i,1)
      const ym=`${d.getFullYear()}-${s2(d.getMonth()+1)}`
      // Ingresos reales del mes (fijos se proyectan, variables solo aparecen en su mes)
      const ingReal=state.incomes.filter(inc=>{
        if(inMonth(inc.date,ym)) return true
        // ingresos fijos: proyectar en meses futuros
        if(inc.type==='fijo'&&i>0) return true
        return false
      }).reduce((s,inc)=>s+inc.amount,0)
      // Gastos reales del mes (fijos se proyectan, variables solo en su mes)
      const gasReal=state.expenses.filter(e=>{
        if(inMonth(e.date,ym)) return true
        if(e.type==='fijo'&&i>0) return true
        return false
      }).reduce((s,e)=>s+e.amount,0)
      // Cuotas activas en ese mes
      const cuotasReal=state.installments.filter(inst=>{
        const paid=inst.paidInstallments, total=inst.numInstallments
        const st=new Date(inst.startDate)
        const diff=(d.getFullYear()-st.getFullYear())*12+(d.getMonth()-st.getMonth())
        return diff>=0&&(paid+diff)<total
      }).reduce((s,inst)=>s+inst.monthlyAmount,0)
      // Deudas (constante mensual)
      const deudasReal=state.debts.reduce((s,debt)=>s+debt.monthlyPayment,0)
      const sinCompra=ingReal-gasReal-cuotasReal-deudasReal
      const cuota=i<n?mp:0
      const conCompra=sinCompra-cuota
      return {mes:i,sinCompra,conCompra,cuota,ingReal,gasReal,label:d.toLocaleDateString('es-CL',{month:'short',year:'2-digit'})}
    })
  },[done,p,n,mp,state.incomes,state.expenses,state.installments,state.debts])

  useEffect(()=>{
    if(!projRef.current||!proj.length)return
    projC.current?.destroy()
    const tc=getComputedStyle(document.documentElement).getPropertyValue('--t3').trim()
    const labels=proj.map(m=>m.label)
    projC.current=new Chart(projRef.current,{type:'bar',
      data:{labels,datasets:[
        {label:'Sin compra',data:proj.map(m=>m.sinCompra),backgroundColor:'#34C75966',borderColor:'#34C759',borderWidth:2,borderRadius:4},
        {label:'Con compra',data:proj.map(m=>m.conCompra),backgroundColor:'#FF3B3066',borderColor:'#FF3B30',borderWidth:2,borderRadius:4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10},color:tc,boxWidth:10}}},
        scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:10}}},y:{grid:{color:'rgba(128,128,128,.1)'},ticks:{color:tc,font:{size:10},callback:v=>`$${Number(v).toLocaleString('es-CL')}`}}}}
    })
    return()=>projC.current?.destroy()
  },[proj])

  // Análisis cualitativo
  const analisis=useMemo(()=>{
    if(!done||!p) return []
    const items=[]
    if(impPct<=10) items.push({ic:'✅',t:'Impacto bajo',d:`La cuota representa solo el ${impPct}% de tus ingresos. Muy manejable.`,c:'var(--g)'})
    else if(impPct<=20) items.push({ic:'🟡',t:'Impacto moderado',d:`La cuota es el ${impPct}% de tus ingresos. Revisa si puedes reducir otros gastos.`,c:'var(--o)'})
    else if(impPct<=30) items.push({ic:'🟠',t:'Impacto significativo',d:`La cuota consume el ${impPct}% de tus ingresos. Tendrás poco margen de maniobra.`,c:'var(--o)'})
    else items.push({ic:'🔴',t:'Impacto alto',d:`La cuota consume el ${impPct}% de tus ingresos. Muy riesgoso para tu estabilidad.`,c:'var(--r)'})

    if(newAvail<0) items.push({ic:'❌',t:'Saldo negativo',d:`Quedarías con ${clp(Math.abs(newAvail))} de déficit mensual. No podrías cubrir todos tus gastos.`,c:'var(--r)'})
    else if(newAvail<mi*0.1) items.push({ic:'⚠️',t:'Sin colchón financiero',d:`Solo te quedarían ${clp(newAvail)} libres al mes (${pct(newAvail,mi)}%). Sin margen para imprevistos.`,c:'var(--o)'})
    else items.push({ic:'💚',t:'Saldo libre suficiente',d:`Te quedarían ${clp(newAvail)} disponibles cada mes para imprevistos y ahorro.`,c:'var(--g)'})

    if(n>1&&intereses>0) items.push({ic:'💸',t:`Costo total del crédito`,d:`Pagarás ${clp(intereses)} extra en intereses. El precio real del producto es ${clp(totalPagar)}.`,c:'var(--o)'})

    const mesesPagoFull=avail>0?Math.ceil(p/avail):999
    if(n>1&&mesesPagoFull<=n+3) items.push({ic:'💡',t:'Alternativa: ahorro previo',d:`Ahorrando tu disponible actual, podrías comprarlo al contado en ~${mesesPagoFull} meses y ahorrar ${clp(intereses)} en intereses.`,c:'var(--a)'})

    const mesesNeg=proj.filter(m=>m.conCompra<0).length
    if(mesesNeg>0) items.push({ic:'📉',t:`${mesesNeg} mes${mesesNeg>1?'es':''} en rojo`,d:`Durante ${mesesNeg} de los próximos ${n} meses tendrías saldo negativo.`,c:'var(--r)'})

    return items
  },[done,p,n,mp,mi,avail,newAvail,impPct,intereses,totalPagar,proj])

  return html`
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="hdr">
        <button class="back" onClick=${()=>dispatch({type:'SUB',p:null})}>‹ Volver</button>
        <div style="flex:1;text-align:center"><div class="htitle" style="font-size:22px">🤔 ¿Puedo comprarlo?</div></div>
        <div style="width:60px"></div>
      </div>
      <div class="page">
        <div class="card">
          <div class="slabel" style="margin-top:0">Tu situación actual</div>
          ${[['💰 Ingresos del mes',clp(mi),'var(--g)'],['💸 Gastos y compromisos',clp(me+mn+md),'var(--r)']].map(([l,v,c])=>html`<div class="srow"><span style="color:var(--t3)">${l}</span><span style="font-weight:700;color:${c}">${v}</span></div>`)}
          <div style="border-top:1px solid var(--sep);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;align-items:center">
            <b>💵 Disponible mensual</b>
            <b style="font-size:20px;color:${avail>=0?'var(--g)':'var(--r)'}">${clp(avail)}</b>
          </div>
        </div>

        <div class="card" style="margin-top:12px">
          <div class="slabel" style="margin-top:0">Simular compra</div>
          <div class="fg"><label class="fl">¿Qué quieres comprar?</label>
            <input class="inp" placeholder="Ej: TV, Auto, Notebook..." value=${desc} onInput=${e=>{setDescS(e.target.value);setDone(false)}}/>
          </div>
          <div class="fg"><label class="fl">Precio</label>
            <div class="awrap"><span class="apfx">$</span><input class="inp ainp" type="number" inputmode="numeric" placeholder="0" value=${price} onInput=${e=>{setPrice(e.target.value);setDone(false)}}/></div>
          </div>
          <div class="row2">
            <div class="fg"><label class="fl">N° cuotas</label>
              <select class="inp" value=${inst} onChange=${e=>{setInst(e.target.value);setDone(false)}}>
                ${[1,2,3,6,9,12,18,24,36,48].map(v=>html`<option value=${v}>${v===1?'Al contado':`${v} cuotas`}</option>`)}
              </select>
            </div>
            <div class="fg"><label class="fl">Tasa anual %</label>
              <input class="inp" type="number" inputmode="decimal" placeholder="0.0" value=${rate} onInput=${e=>{setRate(e.target.value);setDone(false)}}/>
            </div>
          </div>
          ${p>0&&n>1?html`
            <div style="background:var(--s2);border-radius:var(--r12);padding:12px;margin-bottom:12px">
              <div class="srow"><span style="font-size:13px;color:var(--t3)">Cuota mensual</span><b style="color:var(--a)">${clp(mp)}</b></div>
              <div class="srow"><span style="font-size:13px;color:var(--t3)">Total a pagar</span><b>${clp(totalPagar)}</b></div>
              ${intereses>0?html`<div class="srow"><span style="font-size:13px;color:var(--t3)">Intereses totales</span><b style="color:var(--r)">${clp(intereses)}</b></div>`:''}
            </div>`:''}
          <button class="btn bp bfull" disabled=${!p} onClick=${()=>setDone(true)}>🔍 Analizar compra</button>
        </div>

        ${verdict&&html`
          <div style="margin-top:12px;padding:16px;background:${VD[verdict].c}18;border:2px solid ${VD[verdict].c};border-radius:var(--r16)">
            <div style="font-size:24px;font-weight:800;color:${VD[verdict].c}">${VD[verdict].e} ${VD[verdict].t}</div>
            <div style="font-size:14px;margin-top:4px;color:var(--t2)">${VD[verdict].d}</div>
          </div>

          <div class="card" style="margin-top:12px">
            <div class="slabel" style="margin-top:0">📊 Impacto mensual</div>
            ${[
              ['Cuota mensual',clp(mp),impPct>30?'var(--r)':impPct>15?'var(--o)':'var(--g)'],
              ['% de ingresos',impPct+'%',impPct>30?'var(--r)':impPct>15?'var(--o)':'var(--g)'],
              ['Disponible después',clp(newAvail),newAvail>=0?'var(--g)':'var(--r)'],
            ].map(([l,v,c])=>html`<div class="srow"><span style="color:var(--t3)">${l}</span><b style="color:${c}">${v}</b></div>`)}
            <div class="pwrap" style="margin-top:10px">
              <div class="pbar" style="width:${Math.min(100,impPct)}%;background:${impPct>30?'var(--r)':impPct>15?'var(--o)':'var(--g)'}"></div>
            </div>
            <div style="font-size:11px;color:var(--t3);margin-top:4px">Uso del ingreso: ${impPct}% para esta cuota</div>
          </div>

          <div class="card" style="margin-top:12px">
            <div class="slabel" style="margin-top:0">📈 Proyección ${Math.max(n,6)} meses</div>
            <div style="height:200px"><canvas ref=${projRef}></canvas></div>
          </div>

          <div class="slabel">🧠 Análisis detallado</div>
          ${analisis.map(a=>html`
            <div class="card" style="margin-bottom:10px;border-left:4px solid ${a.c}">
              <div style="display:flex;gap:10px;align-items:flex-start">
                <span style="font-size:20px;line-height:1.2">${a.ic}</span>
                <div><b style="color:${a.c}">${a.t}</b><div style="font-size:13px;color:var(--t2);margin-top:3px">${a.d}</div></div>
              </div>
            </div>`)}
        `}
      </div>
    </div>`
}

    const item={id:editing?.id??uid(),category:cat,description:desc,amount:a,date,notes:notes||undefined,createdAt:editing?.createdAt??new Date().toISOString()}
    await DB.put('specials',item)

          <button class="pill ${fc==='todos'?'on':''}" onClick=${()=>setFc('todos')}>Todos</button>
          ${Object.entries(SCLABELS).filter(([v])=>state.specials.some(s=>s.category===v)).map(([v,l])=>html`<button class="pill ${fc===v?'on':''}" onClick=${()=>setFc(v)}>${l}</button>`)}
        </div>
        ${shown.length===0?html`<div class="empty"><div style="font-size:48px">🚗</div><b>Sin gastos especiales</b><button class="btn bo" onClick=${()=>setOpen(true)}>+ Agregar</button></div>`:html`
          <div class="card" style="margin-top:12px">
            ${shown.map(s=>html`
              <div class="li" onClick=${()=>{setEdit(s);resetForm(s);setOpen(true)}}>
                <div class="lic" style="background:var(--ol)">${SCLABELS[s.category]?.split(' ')[0]}</div>
                <div class="lcd"><div class="ltt">${s.description}</div><div class="lsb">${SCLABELS[s.category]?.replace(/^.\s/,'')} · ${fdate(s.date)}</div></div>
                <div style="display:flex;align-items:center;gap:6px">
                  <span class="lam neg">${clp(s.amount)}</span>
                  <button class="btn bico" style="width:30px;height:30px;font-size:12px;background:var(--rl);color:var(--r)" onClick=${e=>{e.stopPropagation();del(s.id)}}>🗑</button>
                </div>
              </div>`)}
          </div>`}
      </div>
      <${Modal} open=${open} onClose=${()=>setOpen(false)} title=${editing?'Editar gasto':'Nuevo gasto especial'}>
        <div class="fg"><label class="fl">Categoría</label>
          <div class="pills">${Object.entries(SCLABELS).map(([v,l])=>html`<button class="pill ${cat===v?'on':''}" onClick=${()=>setCat(v)}>${l}</button>`)}</div>

        <div class="fg"><label class="fl">Descripción</label><input class="inp" placeholder="Ej: Mantención 50.000km" value=${desc} onInput=${e=>setDescG(e.target.value)}/></div>

// ── Calendario ────────────────────────────────────────────────────────────────
function buildCalEvents(state, y, mo) {
  const evs=[]
  const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre']
  // Todos los ingresos del mes
  state.incomes.forEach(i=>{
    const d=new Date(i.date)
    if(d.getFullYear()===y&&d.getMonth()===mo)
      evs.push({day:d.getDate(),label:i.description||ILABELS[i.category]||i.category,amount:i.amount,type:'ingreso',rawDate:d,sub:ILABELS[i.category]||i.category})
  })
  // Todos los gastos del mes
  state.expenses.forEach(e=>{
    const d=new Date(e.date)
    if(d.getFullYear()===y&&d.getMonth()===mo)
      evs.push({day:d.getDate(),label:e.description||ELABELS[e.category]||e.category,amount:e.amount,type:'gasto',rawDate:d,sub:ELABELS[e.category]?.replace(/^.\s/,'')||e.category})
  })
  // Deudas — proyectar pago mensual al día de nextPaymentDate
  state.debts.forEach(d=>{
    const dd=new Date(d.nextPaymentDate)
    // mostrar en el mes visible usando el mismo día del mes
    const rawDate=new Date(y,mo,dd.getDate())
    evs.push({day:dd.getDate(),label:d.name,amount:d.monthlyPayment,type:'deuda',rawDate,sub:'Cuota deuda'})
  })
  // Cuotas activas
  state.installments.filter(i=>i.paidInstallments<i.numInstallments).forEach(i=>{
    const st=new Date(i.startDate),diff=(y-st.getFullYear())*12+(mo-st.getMonth())
    if(diff>=0&&diff<i.numInstallments){
      const rawDate=new Date(y,mo,st.getDate())
      evs.push({day:st.getDate(),label:i.productName,amount:i.monthlyAmount,type:'cuota',rawDate,sub:`Cuota ${i.paidInstallments+1+diff}/${i.numInstallments}`})
    }
  })
  return evs
}

function dispararNotifHoy(state) {
  if(typeof Notification==='undefined'||Notification.permission!=='granted') return
  const hoy=new Date(),ty=hoy.getFullYear(),tm=hoy.getMonth(),td=hoy.getDate()
  const clave='notif_'+ty+'-'+s2(tm+1)+'-'+s2(td)
  if(localStorage.getItem(clave)) return // ya se notificó hoy
  const evs=buildCalEvents(state,ty,tm).filter(e=>e.day===td)
  if(!evs.length) return
  localStorage.setItem(clave,'1')
  setTimeout(()=>{
    evs.forEach(e=>{
      try{
        new Notification('📅 Mis Finanzas',{
          body:`${e.type==='ingreso'?'💰 Ingreso':'💸 Pago'}: ${e.label} — ${e.type==='ingreso'?'+':'-'}${clp(e.amount)}`,
          tag:'mf-'+e.type+'-'+e.label
        })
      }catch(_){}
    })
  },1500)
}

function Calendario() {
  const {state,dispatch} = useApp()
  const today=new Date()
  const [vd,setVd] = useState(new Date(today.getFullYear(),today.getMonth(),1))
  const [notifPerm,setNotifPerm] = useState(typeof Notification!=='undefined'?Notification.permission:'denied')
  const [selDay,setSelDay] = useState(null)
  const y=vd.getFullYear(),mo=vd.getMonth()
  const fd=new Date(y,mo,1).getDay(),dim=new Date(y,mo+1,0).getDate()
  const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']
  const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre']

  async function pedirNotif(){
    if(typeof Notification==='undefined'){alert('Tu dispositivo no soporta notificaciones web.');return}
    const p=await Notification.requestPermission()
    setNotifPerm(p)
    if(p==='granted'){
      localStorage.removeItem('notif_'+today.getFullYear()+'-'+s2(today.getMonth()+1)+'-'+s2(today.getDate()))
      dispararNotifHoy(state)
    }
  }

  const allEvents=useMemo(()=>buildCalEvents(state,y,mo),[state.debts,state.installments,state.incomes,state.expenses,y,mo])
  const byDay=useMemo(()=>{const m={};allEvents.forEach(e=>{if(!m[e.day])m[e.day]=[];m[e.day].push(e)});return m},[allEvents])
  const todayEvs=byDay[today.getDate()]||[]
  const upcoming=allEvents.filter(e=>{const d=new Date(y,mo,e.day);return d>=new Date(today.getFullYear(),today.getMonth(),today.getDate())}).sort((a,b)=>a.day-b.day)
  const selEvs=selDay!=null?byDay[selDay]||[]:null
  const TC={ingreso:'var(--g)',gasto:'var(--r)',deuda:'var(--r)',cuota:'var(--o)'}
  const TIC={ingreso:'💰',gasto:'💸',deuda:'💳',cuota:'📦'}
  const isCurrMonth=y===today.getFullYear()&&mo===today.getMonth()

  return html`
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="hdr">
        <button class="back" onClick=${()=>dispatch({type:'SUB',p:null})}>‹ Volver</button>
        <div style="flex:1;text-align:center"><div class="htitle" style="font-size:22px">📅 Calendario</div></div>
        <button class="btn bsm" style="background:${notifPerm==='granted'?'var(--gl)':'var(--al)'};color:${notifPerm==='granted'?'var(--g)':'var(--a)'}" onClick=${pedirNotif}
          title=${notifPerm==='granted'?'Notificaciones activas':'Activar notificaciones'}>
          ${notifPerm==='granted'?'🔔':'🔕'}
        </button>
      </div>
      <div class="page">
        ${notifPerm!=='granted'&&html`
          <div class="card" style="margin-bottom:12px;background:var(--al);border:1px solid var(--a)">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:26px">🔔</span>
              <div style="flex:1">
                <b style="color:var(--a)">Activar notificaciones</b>
                <div style="font-size:12px;color:var(--t2);margin-top:2px">Te avisamos automáticamente cada día que tengas un pago o ingreso registrado</div>
              </div>
              <button class="btn bp bsm" onClick=${pedirNotif}>Activar</button>
            </div>
          </div>`}

        ${isCurrMonth&&todayEvs.length>0&&html`
          <div class="card" style="margin-bottom:12px;background:var(--al);border:2px solid var(--a)">
            <div style="font-weight:700;color:var(--a);margin-bottom:8px">📍 Hoy — ${today.toLocaleDateString('es-CL',{day:'numeric',month:'long'})}</div>
            ${todayEvs.map(e=>html`
              <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px solid var(--sep)">
                <span>${TIC[e.type]}</span>
                <span style="flex:1;font-size:14px">${e.label}</span>
                <b style="color:${TC[e.type]}">${e.type==='ingreso'?'+':'-'}${clp(e.amount)}</b>
              </div>`)}
          </div>`}

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <button class="btn bs bsm" onClick=${()=>{setVd(new Date(y,mo-1,1));setSelDay(null)}}>‹</button>
          <b style="font-size:17px;text-transform:capitalize">${MONTHS[mo]} ${y}</b>
          <button class="btn bs bsm" onClick=${()=>{setVd(new Date(y,mo+1,1));setSelDay(null)}}>›</button>
        </div>
        <div class="card" style="padding:10px">
          <div class="cgrid" style="margin-bottom:6px">${DAYS.map(d=>html`<div class="cdh">${d}</div>`)}</div>
          <div class="cgrid">
            ${Array.from({length:fd},(_,i)=>html`<div key=${`e${i}`}></div>`)}
            ${Array.from({length:dim},(_,i)=>{
              const day=i+1
              const isToday=day===today.getDate()&&mo===today.getMonth()&&y===today.getFullYear()
              const isSel=day===selDay
              const evs=byDay[day]
              const hasInc=evs?.some(e=>e.type==='ingreso')
              const hasExp=evs?.some(e=>e.type!=='ingreso')
              return html`
                <div class="cd ${isToday?'today':''}"
                  style="position:relative;cursor:${evs?'pointer':'default'};box-shadow:${isSel?'0 0 0 2px var(--a)':'none'};border-radius:8px"
                  onClick=${()=>setSelDay(evs?(isSel?null:day):null)}>
                  <span>${day}</span>
                  ${evs&&html`<div style="display:flex;gap:2px;margin-top:2px;justify-content:center">
                    ${hasInc&&html`<div style="width:5px;height:5px;border-radius:50%;background:${isToday?'#fff':'var(--g)'}"></div>`}
                    ${hasExp&&html`<div style="width:5px;height:5px;border-radius:50%;background:${isToday?'rgba(255,255,255,.7)':'var(--r)'}"></div>`}
                  </div>`}
                </div>`})}
          </div>
          <div style="display:flex;gap:12px;margin-top:10px;padding-top:8px;border-top:1px solid var(--sep);font-size:11px;color:var(--t3)">
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--g);margin-right:4px"></span>Ingreso</span>
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--r);margin-right:4px"></span>Gasto / pago</span>
          </div>
        </div>

        ${selEvs!=null&&html`
          <div class="card" style="margin-top:12px;border:2px solid var(--a)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <b style="color:var(--a)">${selDay} de ${MONTHS[mo]}</b>
              <button class="btn bsm bs" onClick=${()=>setSelDay(null)}>✕</button>
            </div>
            ${selEvs.length===0?html`<div style="color:var(--t3);text-align:center;padding:8px">Sin movimientos</div>`:
              selEvs.map(e=>html`
                <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--sep)">
                  <span style="font-size:20px">${TIC[e.type]}</span>
                  <div style="flex:1">
                    <div style="font-weight:600;font-size:14px">${e.label}</div>
                    <div style="font-size:11px;color:var(--t3)">${e.sub}</div>
                  </div>
                  <b style="color:${TC[e.type]}">${e.type==='ingreso'?'+':'-'}${clp(e.amount)}</b>
                </div>`)}
            <div style="display:flex;justify-content:space-between;padding-top:10px;border-top:2px solid var(--sep);margin-top:4px">
              <b>Balance del día</b>
              <b style="color:${selEvs.reduce((s,e)=>s+(e.type==='ingreso'?e.amount:-e.amount),0)>=0?'var(--g)':'var(--r)'}">
                ${clp(selEvs.reduce((s,e)=>s+(e.type==='ingreso'?e.amount:-e.amount),0))}
              </b>
            </div>
          </div>`}

        ${upcoming.length>0?html`
          <div class="slabel">Próximos movimientos</div>
          <div class="card">
            ${upcoming.slice(0,15).map(e=>{
              const dd=new Date(y,mo,e.day),diff=Math.round((new Date(y,mo,e.day)-new Date(today.getFullYear(),today.getMonth(),today.getDate()))/864e5)
              return html`
                <div class="li" onClick=${()=>setSelDay(e.day)} style="cursor:pointer">
                  <div class="lic" style="background:${e.type==='ingreso'?'var(--gl)':'var(--rl)'}">${TIC[e.type]}</div>
                  <div class="lcd">
                    <div class="ltt">${e.label}</div>
                    <div class="lsb">${dd.toLocaleDateString('es-CL',{day:'numeric',month:'long'})} · ${diff===0?'🔴 Hoy':diff===1?'Mañana':'En '+diff+' días'}</div>
                  </div>
                  <div style="text-align:right">
                    <div class="lam" style="color:${TC[e.type]}">${e.type==='ingreso'?'+':'-'}${clp(e.amount)}</div>
                    ${diff<=2&&e.type!=='ingreso'?html`<span class="badge br2" style="font-size:10px">Urgente</span>`:''}
                  </div>
                </div>`})}
          </div>`:''}
        ${allEvents.length===0?html`
          <div class="empty">
            <div style="font-size:48px">📅</div>
            <b>Sin movimientos este mes</b>
            <span style="color:var(--t3);text-align:center">Registra ingresos, gastos, deudas y cuotas para verlos aquí</span>
          </div>`:''}
      </div>
    </div>`
}

// ── Reportes ──────────────────────────────────────────────────────────────────
function Reportes() {
  const {state,dispatch} = useApp()
  const m12=useMemo(()=>{const ms=[];const n=new Date();for(let i=0;i<12;i++){const d=new Date(n.getFullYear(),n.getMonth()+i,1);ms.push(`${d.getFullYear()}-${s2(d.getMonth()+1)}`)}return ms},[])
  const md12=useMemo(()=>state.debts.reduce((s,d)=>s+d.monthlyPayment,0),[state.debts])
  const mi2_12=useMemo(()=>state.installments.filter(i=>i.paidInstallments<i.numInstallments).reduce((s,i)=>s+i.monthlyAmount,0),[state.installments])
  const [selM,setSelM] = useState(m12[0])
  const lineRef=useRef(null),lineC=useRef(null)
  const data=useMemo(()=>m12.map(m=>({month:m,income:state.incomes.filter(i=>inMonth(i.date,m)).reduce((s,i)=>s+i.amount,0),expense:state.expenses.filter(e=>inMonth(e.date,m)).reduce((s,e)=>s+e.amount,0)+md12+mi2_12})),[state.incomes,state.expenses,m12,md12,mi2_12])
  const det=useMemo(()=>{
    const inc=state.incomes.filter(i=>inMonth(i.date,selM)).reduce((s,i)=>s+i.amount,0)
    const exp=state.expenses.filter(e=>inMonth(e.date,selM)).reduce((s,e)=>s+e.amount,0)
    const byCat={}
    state.expenses.filter(e=>inMonth(e.date,selM)).forEach(e=>{byCat[e.category]=(byCat[e.category]??0)+e.amount})
    return {inc,exp,sav:inc-exp,byCat}
  },[state.incomes,state.expenses,selM])
  useEffect(()=>{
    if(!lineRef.current)return
    lineC.current?.destroy()
    const tc=getComputedStyle(document.documentElement).getPropertyValue('--t3').trim()
    lineC.current=new Chart(lineRef.current,{type:'line',data:{labels:m12.map(m=>fmonth(m).split(' ')[0]),datasets:[
      {label:'Ingresos',data:data.map(d=>d.income),borderColor:'#34C759',backgroundColor:'#34C75920',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#34C759'},
      {label:'Gastos',data:data.map(d=>d.expense),borderColor:'#FF3B30',backgroundColor:'#FF3B3020',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#FF3B30'}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10},color:tc,boxWidth:10}}},scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:10}}},y:{grid:{color:'rgba(128,128,128,.1)'},ticks:{color:tc,font:{size:10},callback:v=>`$${Number(v).toLocaleString('es-CL')}`}}}}})
    return()=>lineC.current?.destroy()
  },[data,m12])
  function exportCSV(){
    const rows=[['Mes','Ingresos','Gastos+Deudas','Ahorro proyectado'],...data.map(d=>[fmonth(d.month),d.income,d.expense,d.income-d.expense])]
    const csv=rows.map(r=>r.join(',')).join('\n')
    const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);a.download='finanzas.csv';a.click()
  }
  return html`
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="hdr">
        <button class="back" onClick=${()=>dispatch({type:'SUB',p:null})}>‹ Volver</button>
        <div style="flex:1;text-align:center"><div class="htitle" style="font-size:22px">📊 Reportes</div></div>
        <button class="btn bs bsm" onClick=${exportCSV}>⬇ CSV</button>
      </div>
      <div class="page">
        <div class="card"><div class="slabel" style="margin-top:0">Proyección 12 meses</div><div class="chart-w" style="height:220px"><canvas ref=${lineRef}></canvas></div></div>
        <div class="card" style="margin-top:10px">
          <div class="slabel" style="margin-top:0">Resumen por mes</div>
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:13px">
              <thead><tr style="border-bottom:2px solid var(--sep)">
                ${['Mes','Ingresos','Gastos','Ahorro','%'].map(h=>html`<th style="padding:6px 8px;text-align:${h==='Mes'?'left':'right'};color:var(--t3);font-weight:600">${h}</th>`)}
              </tr></thead>
              <tbody>
                ${data.map(d=>{const sav=d.income-d.expense,sp=pct(sav,d.income);return html`
                  <tr style="border-bottom:1px solid var(--sep);cursor:pointer;background:${d.month===selM?'var(--al)':'transparent'}" onClick=${()=>setSelM(d.month)}>
                    <td style="padding:8px;font-weight:500;text-transform:capitalize">${fmonth(d.month).split(' ')[0]}</td>
                    <td style="padding:8px;text-align:right;color:var(--g);font-weight:600">${clp(d.income)}</td>
                    <td style="padding:8px;text-align:right;color:var(--r);font-weight:600">${clp(d.expense)}</td>
                    <td style="padding:8px;text-align:right;color:${sav>=0?'var(--g)':'var(--r)'};font-weight:700">${clp(sav)}</td>
                    <td style="padding:8px;text-align:right;font-weight:700;color:${sp>=20?'var(--g)':sp>=10?'var(--o)':'var(--r)'}">${sp}%</td>
                  </tr>`})}
              </tbody>
            </table>
          </div>
        </div>
        <div class="slabel">Detalle: ${fmonth(selM)}</div>
        <div class="grid2">
          ${[['💰 Ingresos',clp(det.inc),'g'],['💸 Gastos',clp(det.exp),'r'],['💵 Ahorro',clp(det.sav),det.sav>=0?'g':'r'],['📈 %',pct(det.sav,det.inc)+'%','a']].map(([l,v,c])=>html`<div class="card"><div class="slbl">${l}</div><div class="sval ${c}">${v}</div></div>`)}
        </div>
        ${Object.keys(det.byCat).length>0?html`
          <div class="card" style="margin-top:10px">
            <div class="slabel" style="margin-top:0">Por categoría</div>
            ${Object.entries(det.byCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>html`
              <div class="srow">
                <span style="font-size:14px">${ELABELS[cat]?.replace(/^.\s/,'')||cat}</span>
                <div style="display:flex;align-items:center;gap:10px">
                  <div style="width:80px"><div class="pwrap" style="margin:0"><div class="pbar" style="width:${pct(amt,det.exp)}%;background:var(--r)"></div></div></div>
                  <span style="font-weight:700;color:var(--r);min-width:80px;text-align:right">${clp(amt)}</span>
                </div>
              </div>`)}
          </div>`:''}
      </div>
    </div>`
}

// ── Configuración ─────────────────────────────────────────────────────────────
function Configuracion() {
  const {state,dispatch,saveSetting} = useApp()
  const [showPIN,setShowPIN] = useState(false)
  const [pin,setPin] = useState('')
  const [pin2,setPin2] = useState('')
  const [pinStep,setPinStep] = useState('menu')
  const [pinErr,setPinErr] = useState(false)
  function resetPin(){setPin('');setPin2('');setPinStep('menu');setPinErr(false)}
  function handleKey(k,target){
    const cur=target==='pin1'?pin:pin2,setter=target==='pin1'?setPin:setPin2
    if(k==='del'){setter(cur.slice(0,-1));setPinErr(false);return}
    if(cur.length>=4)return
    const next=cur+k
    setter(next)
    if(next.length===4){
      if(target==='pin1')setPinStep('confirm')
      else{if(next===pin){saveSetting({pin});resetPin()}else{setPinErr(true);setPin2('')}}
    }
  }
  async function exportAll(){
    const data=await DB.exportAll()
    const a=document.createElement('a')
    a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2))
    a.download=`mis-finanzas-${new Date().toISOString().split('T')[0]}.json`
    a.click()
  }
  function importAll(){
    const inp=document.createElement('input');inp.type='file';inp.accept='.json'
    inp.onchange=async e=>{const f=e.target.files?.[0];if(!f)return;try{const d=JSON.parse(await f.text());await DB.importAll(d);location.reload()}catch{alert('Error al importar')}}
    inp.click()
  }
  const currPIN=state.settings.pin
  return html`
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="hdr">
        <button class="back" onClick=${()=>dispatch({type:'SUB',p:null})}>‹ Volver</button>
        <div style="flex:1;text-align:center"><div class="htitle" style="font-size:22px">⚙️ Configuración</div></div>
        <div style="width:60px"></div>
      </div>
      <div class="page">
        <div class="slabel">Apariencia</div>
        <div class="card">
          <div style="font-weight:600;margin-bottom:8px">Tema de color</div>
          <div class="pills">
            ${[['light','☀️ Claro'],['dark','🌙 Oscuro'],['system','⚙️ Sistema']].map(([v,l])=>html`
              <button class="pill ${state.settings.theme===v?'on':''}" onClick=${()=>saveSetting({theme:v})}>${l}</button>`)}
          </div>
        </div>
        <div class="slabel">Objetivos</div>
        <div class="card">
          <div class="fg"><label class="fl">Meta de ahorro mensual (%)</label>
            <input class="inp" type="number" inputmode="numeric" min="0" max="100" value=${state.settings.monthlyGoalPct} onInput=${e=>saveSetting({monthlyGoalPct:parseInt(e.target.value)||0})}/>
            <div style="font-size:12px;color:var(--t3);margin-top:4px">Se recomienda ahorrar al menos el 20% de tus ingresos</div>
          </div>
        </div>
        <div class="slabel">Seguridad</div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><b>🔐 PIN de acceso</b><div style="font-size:13px;color:var(--t3)">${currPIN?'PIN configurado':'Sin PIN configurado'}</div></div>
            <button class="btn bs bsm" onClick=${()=>setShowPIN(!showPIN)}>${showPIN?'Ocultar':'Configurar'}</button>
          </div>
          ${showPIN&&html`
            <div style="margin-top:16px">
              ${pinStep==='menu'?html`
                <div style="display:flex;gap:8px">
                  <button class="btn bs bfull" onClick=${()=>{setPin('');setPin2('');setPinStep('set')}}>🔑 ${currPIN?'Cambiar':'Crear'} PIN</button>
                  ${currPIN?html`<button class="btn br bfull" onClick=${()=>{saveSetting({pin:''});resetPin()}}>🗑 Eliminar</button>`:''}
                </div>`:html`
                <div style="text-align:center">
                  <div style="margin-bottom:12px;font-weight:600">${pinStep==='set'?'Ingresa tu nuevo PIN (4 dígitos)':'Confirma tu PIN'}</div>
                  <div class="pindots" style="justify-content:center;margin-bottom:12px">
                    ${[0,1,2,3].map(i=>html`<div class="pindot ${(pinStep==='set'?pin:pin2).length>i?'f':''}"></div>`)}
                  </div>
                  ${pinErr?html`<div style="color:var(--r);margin-bottom:8px">Los PIN no coinciden</div>`:''}
                  <div class="pinpad" style="margin:0 auto 12px">
                    ${['1','2','3','4','5','6','7','8','9','','0','del'].map((k,i)=>k===''?html`<div></div>`:html`
                      <button class="pkey" onClick=${()=>handleKey(k,pinStep==='set'?'pin1':'pin2')}>${k==='del'?'⌫':k}</button>`)}
                  </div>
                  <button class="btn bs" onClick=${resetPin}>Cancelar</button>
                </div>`}
            </div>`}
        </div>
        <div class="slabel">Datos y respaldo</div>
        <div class="card">
          <div style="display:flex;flex-direction:column;gap:10px">
            <button class="btn bp bfull" onClick=${exportAll}>⬆️ Exportar datos (JSON)</button>
            <button class="btn bs bfull" onClick=${importAll}>⬇️ Importar datos (JSON)</button>
            <div class="divider"></div>
            <button class="btn bfull" style="background:var(--rl);color:var(--r)" onClick=${()=>{if(confirm('¿Eliminar TODOS los datos? Esto no se puede deshacer.'))if(confirm('¿Confirmas?')){indexedDB.deleteDatabase('mis-finanzas');location.reload()}}}>🗑 Eliminar todos los datos</button>
          </div>
        </div>
        <div class="slabel">Acerca de</div>
        <div class="card" style="text-align:center;padding:24px">
          <div style="font-size:52px;margin-bottom:8px">💼</div>
          <div style="font-weight:800;font-size:22px">Mis Finanzas</div>
          <div style="color:var(--t3);font-size:13px;margin-top:6px">Versión 1.0.0 · Funciona sin conexión · Datos locales</div>
        </div>
      </div>
    </div>`
}

// ── Estado de Cuenta ──────────────────────────────────────────────────────────
function EstadoCuenta() {
  const {dispatch} = useApp()
  const [text,setText] = useState('')
  const [parsed,setParsed] = useState(null)
  const [selected,setSelected] = useState({})
  const [step,setStep] = useState('paste') // paste | review | done
  const [meses,setMeses] = useState('1')

  function parseLine(line) {
    // Detecta montos en formato chileno: $1.234.567 o 1.234.567 o 1234567
    const amtRx = /\$?\s*([\d]{1,3}(?:[.,]\d{3})*(?:[.,]\d{1,2})?)/g
    const amounts = []
    let m
    while((m=amtRx.exec(line))!==null){
      const raw=m[1].replace(/\./g,'').replace(',','.')
      const n=parseFloat(raw)
      if(n>=1000&&n<100000000) amounts.push(n)
    }
    // Detecta cuotas: "3/12" o "cuota 3 de 12" o "(3 de 12)"
    const cuotaRx = /\(?(\d+)\s*[\/\-]\s*(\d+)\)?|cuota\s+(\d+)\s+de\s+(\d+)/i
    const cm = cuotaRx.exec(line)
    const cuotaActual = cm ? parseInt(cm[1]||cm[3]) : null
    const cuotaTotal  = cm ? parseInt(cm[2]||cm[4]) : null
    const cuotasRest  = (cuotaActual&&cuotaTotal) ? cuotaTotal-cuotaActual : null
    // Detecta fecha
    const dateRx = /(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/
    const dm = dateRx.exec(line)
    let date = todayISO()
    if(dm){
      const y=dm[3]?(dm[3].length===2?'20'+dm[3]:dm[3]):new Date().getFullYear()
      date=`${y}-${s2(parseInt(dm[2]))}-${s2(parseInt(dm[1]))}`
    }
    // Descripción: quitar números y símbolos solos
    const desc = line.replace(/\$[\d.,]+/g,'').replace(/\d{1,2}[\/\-]\d{1,2}(?:[\/\-]\d{2,4})?/g,'').replace(/\s{2,}/g,' ').trim().slice(0,80)
    return amounts.length>0 ? {desc,amount:amounts[0],date,cuotaActual,cuotaTotal,cuotasRest} : null
  }

  function parseText() {
    if(!text.trim()){return}
    const lines = text.split(/\n/).map(l=>l.trim()).filter(l=>l.length>3)
    const items = []
    lines.forEach((line,i)=>{
      const r=parseLine(line)
      if(r&&r.desc.length>2) items.push({id:uid(),...r})
    })
    if(items.length===0){alert('No se encontraron transacciones. Revisa que el texto tenga montos y descripciones.');return}
    const sel={}; items.forEach(it=>sel[it.id]=true)
    setParsed(items); setSelected(sel); setStep('review')
  }

  async function importar() {
    const {dispatch:d} = useApp()
    const mesesN=parseInt(meses)||1
    const items=parsed.filter(it=>selected[it.id])
    let count=0
    for(const it of items){
      const baseDate=new Date(it.date+'T12:00:00')
      const totalMeses=(it.cuotasRest&&it.cuotasRest>1)?Math.min(it.cuotasRest,mesesN):mesesN
      for(let i=0;i<totalMeses;i++){
        const nd=new Date(baseDate.getFullYear(),baseDate.getMonth()+i,baseDate.getDate())
        const expense={id:uid(),category:'servicios',type:'fijo',amount:it.amount,
          description:it.cuotaTotal?`${it.desc} (${(it.cuotaActual||1)+i}/${it.cuotaTotal})`:it.desc,
          date:`${nd.getFullYear()}-${s2(nd.getMonth()+1)}-${s2(nd.getDate())}`,
          createdAt:new Date().toISOString()}
        await DB.put('expenses',expense)
        dispatch({type:'ADD_E',p:expense})
        count++
      }
    }
    setStep('done')
    setTimeout(()=>{dispatch({type:'TAB',p:'gastos'})},1500)
  }

  return html`
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="hdr">
        <button class="back" onClick=${()=>dispatch({type:'SUB',p:null})}>‹ Volver</button>
        <div style="flex:1;text-align:center"><div class="htitle">🏦 Estado de cuenta</div></div>
        <div style="width:60px"></div>
      </div>
      <div class="page">
        ${step==='paste'&&html`
          <div class="card" style="margin-bottom:12px">
            <div style="font-weight:700;font-size:16px;margin-bottom:6px">¿Cómo usar?</div>
            <div style="font-size:13px;color:var(--t3);line-height:1.6">
              1. Abre tu estado de cuenta (PDF, email o web del banco)<br/>
              2. Selecciona y copia el texto de las transacciones<br/>
              3. Pégalo aquí — la app detectará montos, fechas y cuotas automáticamente
            </div>
          </div>
          <div class="fg">
            <label class="fl">Pega el texto de tu estado de cuenta</label>
            <textarea class="inp" style="height:220px;font-size:13px;font-family:monospace" placeholder="Ej:&#10;15/06  Netflix                    $17.990&#10;10/06  Cuentas BCI (2/12)         $45.000&#10;05/06  Supermercado Jumbo          $89.500&#10;..." value=${text} onInput=${e=>setText(e.target.value)}></textarea>
          </div>
          <div class="fg">
            <label class="fl">Cargar en cuántos meses futuros</label>
            <div class="pills">${['1','2','3','6'].map(v=>html`<button class="pill ${meses===v?'on':''}" onClick=${()=>setMeses(v)}>${v==='1'?'Solo este mes':v+' meses'}</button>`)}</div>
            <div style="font-size:12px;color:var(--t3);margin-top:6px">Para gastos fijos o cuotas, puedes repetirlos en meses siguientes</div>
          </div>
          <button class="btn bg bfull" onClick=${parseText}>🔍 Analizar texto</button>
        `}
        ${step==='review'&&html`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div>
              <div style="font-weight:700;font-size:16px">Transacciones encontradas</div>
              <div style="font-size:13px;color:var(--t3)">${parsed.length} ítems · Selecciona los que quieres importar</div>
            </div>
            <button class="btn bs bsm" onClick=${()=>{const all={};parsed.forEach(it=>all[it.id]=!Object.values(selected).every(Boolean));setSelected(all)}}>
              ${Object.values(selected).every(Boolean)?'Deselec. todo':'Selec. todo'}
            </button>
          </div>
          ${parsed.map(it=>html`
            <div class="card" style="margin-bottom:8px;opacity:${selected[it.id]?1:.4};border:2px solid ${selected[it.id]?'var(--g)':'var(--sep)'}" onClick=${()=>setSelected(s=>({...s,[it.id]:!s[it.id]}))}>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="font-size:22px">${selected[it.id]?'✅':'⬜'}</div>
                <div style="flex:1">
                  <div style="font-weight:600;font-size:14px">${it.desc||'Sin descripción'}</div>
                  <div style="font-size:12px;color:var(--t3)">${fdate(it.date)}${it.cuotaTotal?html` · <b style="color:var(--o)">Cuota ${it.cuotaActual}/${it.cuotaTotal} · ${it.cuotasRest} restantes</b>`:''}</div>
                </div>
                <div style="font-weight:800;color:var(--r);font-size:16px">${clp(it.amount)}</div>
              </div>
            </div>`)}
          <div style="margin-top:16px;background:var(--s2);border-radius:12px;padding:14px;margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;font-weight:700">
              <span>Total seleccionado</span>
              <span style="color:var(--r)">${clp(parsed.filter(it=>selected[it.id]).reduce((s,it)=>s+it.amount,0))}</span>
            </div>
            <div style="font-size:12px;color:var(--t3);margin-top:4px">${Object.values(selected).filter(Boolean).length} de ${parsed.length} ítems</div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn bs bfull" onClick=${()=>setStep('paste')}>← Editar texto</button>
            <button class="btn bg bfull" onClick=${importar}>✓ Importar ${Object.values(selected).filter(Boolean).length} gastos</button>
          </div>
        `}
        ${step==='done'&&html`
          <div class="empty" style="height:60vh">
            <div style="font-size:72px">✅</div>
            <b style="font-size:22px">¡Importado!</b>
            <div style="color:var(--t3)">Los gastos fueron agregados. Redirigiendo a Gastos…</div>
          </div>
        `}
      </div>
    </div>`
}

// ── Importar Excel ─────────────────────────────────────────────────────────────
function ImportarExcel() {
  const {dispatch} = useApp()
  const [step,setStep] = useState('upload') // upload | map | review | done
  const [rows,setRows] = useState([])
  const [headers,setHeaders] = useState([])
  const [map,setMap] = useState({fecha:'',monto:'',descripcion:'',categoria:''})
  const [preview,setPreview] = useState([])
  const [selected,setSelected] = useState({})
  const [error,setError] = useState('')
  const fileRef = useRef(null)

  function handleFile(e) {
    const file=e.target.files[0]; if(!file)return
    if(typeof XLSX==='undefined'){setError('Librería Excel no disponible. Recarga la app.');return}
    const reader=new FileReader()
    reader.onload=ev=>{
      try {
        const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true})
        const ws=wb.Sheets[wb.SheetNames[0]]
        const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''})
        if(data.length<2){setError('La hoja está vacía o no tiene datos.');return}
        const hdrs=data[0].map((h,i)=>h?String(h):`Columna ${i+1}`)
        setHeaders(hdrs)
        setRows(data.slice(1).filter(r=>r.some(c=>c!=='')))
        // Auto-detectar columnas comunes
        const autoMap={fecha:'',monto:'',descripcion:'',categoria:''}
        hdrs.forEach((h,i)=>{
          const hl=h.toLowerCase()
          if(!autoMap.fecha&&/fecha|date|día|dia/.test(hl)) autoMap.fecha=String(i)
          if(!autoMap.monto&&/monto|amount|valor|cargo|importe|total/.test(hl)) autoMap.monto=String(i)
          if(!autoMap.descripcion&&/desc|glosa|concepto|detalle|nombre|comercio/.test(hl)) autoMap.descripcion=String(i)
          if(!autoMap.categoria&&/categ|tipo|rubro/.test(hl)) autoMap.categoria=String(i)
        })
        setMap(autoMap)
        setError('')
        setStep('map')
      } catch(err){setError('Error al leer el archivo: '+err.message)}
    }
    reader.readAsArrayBuffer(file)
  }

  function buildPreview() {
    const fi=parseInt(map.fecha),mi=parseInt(map.monto),di=parseInt(map.descripcion),ci=parseInt(map.categoria)
    const items=rows.map((row,idx)=>{
      let rawDate=map.fecha!==''?row[fi]:null
      let date=todayISO()
      if(rawDate instanceof Date){date=`${rawDate.getFullYear()}-${s2(rawDate.getMonth()+1)}-${s2(rawDate.getDate())}`}
      else if(rawDate){
        const s=String(rawDate)
        const dm=s.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/)
        if(dm){const y=dm[3]?(dm[3].length===2?'20'+dm[3]:dm[3]):new Date().getFullYear();date=`${y}-${s2(parseInt(dm[2]))}-${s2(parseInt(dm[1]))}`}
      }
      const rawAmt=map.monto!==''?row[mi]:0
      const amt=Math.abs(parseFloat(String(rawAmt).replace(/[^0-9.,\-]/g,'').replace(',','.'))||0)
      const desc=map.descripcion!==''?String(row[di]).trim():''
      const catRaw=map.categoria!==''?String(row[ci]).toLowerCase():''
      let category='otros'
      if(/super|aliment|comida|restaur|cafe|almuerzo/.test(catRaw)||/super|aliment|comida|restaur|cafe/.test(desc.toLowerCase())) category='alimentacion'
      else if(/trans|metro|micro|uber|taxi|bencin|petrol/.test(catRaw)||/trans|metro|micro|uber|taxi/.test(desc.toLowerCase())) category='transporte'
      else if(/salud|farm|med|clínica|clinica|doctor/.test(catRaw)) category='salud'
      else if(/entret|spotify|netflix|cine|streaming/.test(catRaw)||/netflix|spotify|cine/.test(desc.toLowerCase())) category='entretenimiento'
      else if(/serv|luz|agua|gas|internet|cable/.test(catRaw)) category='servicios'
      else if(/ropa|vest|zapato/.test(catRaw)) category='vestuario'
      return {id:uid(),date,amount:amt,description:desc||`Fila ${idx+2}`,category,type:'variable',createdAt:new Date().toISOString()}
    }).filter(it=>it.amount>0&&it.description.trim())
    const sel={}; items.forEach(it=>sel[it.id]=true)
    setPreview(items); setSelected(sel); setStep('review')
  }

  async function importar() {
    const items=preview.filter(it=>selected[it.id])
    for(const it of items){await DB.put('expenses',it);dispatch({type:'ADD_E',p:it})}
    setStep('done')
    setTimeout(()=>dispatch({type:'TAB',p:'gastos'}),1500)
  }

  const CATL={alimentacion:'🛒',transporte:'🚗',salud:'💊',entretenimiento:'🎬',servicios:'⚡',vestuario:'👕',otros:'📦'}

  return html`
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="hdr">
        <button class="back" onClick=${()=>dispatch({type:'SUB',p:null})}>‹ Volver</button>
        <div style="flex:1;text-align:center"><div class="htitle">📊 Importar Excel</div></div>
        <div style="width:60px"></div>
      </div>
      <div class="page">
        ${step==='upload'&&html`
          <div class="card" style="margin-bottom:12px">
            <div style="font-weight:700;font-size:16px;margin-bottom:6px">¿Cómo usar?</div>
            <div style="font-size:13px;color:var(--t3);line-height:1.6">
              1. Descarga tu cartola o movimientos desde el banco en formato Excel (.xlsx)<br/>
              2. Súbela aquí — la app detectará automáticamente las columnas<br/>
              3. Revisa y selecciona qué gastos importar
            </div>
          </div>
          ${error&&html`<div style="background:var(--rl);border:1.5px solid var(--r);border-radius:12px;padding:12px;margin-bottom:12px;color:var(--r);font-weight:600">${error}</div>`}
          <div style="border:2px dashed var(--sep);border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer" onClick=${()=>fileRef.current?.click()}>
            <div style="font-size:52px;margin-bottom:12px">📂</div>
            <div style="font-weight:700;font-size:18px">Toca para seleccionar archivo</div>
            <div style="color:var(--t3);font-size:14px;margin-top:6px">Compatible con .xlsx y .xls</div>
          </div>
          <input ref=${fileRef} type="file" accept=".xlsx,.xls" style="display:none" onChange=${handleFile}/>
          <div class="card" style="margin-top:16px">
            <div style="font-size:13px;color:var(--t3)"><b>Formatos soportados:</b><br/>
            ✓ Cartola BCI, Santander, Banco Chile<br/>
            ✓ Estado de tarjeta CMR, Ripley, Lider<br/>
            ✓ Cualquier Excel con columnas de fecha, monto y descripción</div>
          </div>
        `}
        ${step==='map'&&html`
          <div style="font-weight:700;font-size:16px;margin-bottom:4px">Confirmar columnas</div>
          <div style="font-size:13px;color:var(--t3);margin-bottom:16px">Se encontraron ${rows.length} filas. Indica qué columna corresponde a cada campo:</div>
          ${[['fecha','📅 Fecha'],['monto','💰 Monto'],['descripcion','📝 Descripción'],['categoria','🏷 Categoría (opcional)']].map(([k,lb])=>html`
            <div class="fg">
              <label class="fl">${lb}</label>
              <select class="inp" value=${map[k]} onChange=${e=>setMap(m=>({...m,[k]:e.target.value}))}>
                <option value="">— No usar —</option>
                ${headers.map((h,i)=>html`<option value=${String(i)}>${h} ${rows[0]?`(ej: ${String(rows[0][i]).slice(0,20)})`:''}</option>`)}
              </select>
            </div>`)}
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn bs bfull" onClick=${()=>setStep('upload')}>← Volver</button>
            <button class="btn bg bfull" onClick=${buildPreview} disabled=${!map.monto}>Vista previa →</button>
          </div>
        `}
        ${step==='review'&&html`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div>
              <div style="font-weight:700;font-size:16px">Vista previa</div>
              <div style="font-size:13px;color:var(--t3)">${preview.length} gastos detectados</div>
            </div>
            <button class="btn bs bsm" onClick=${()=>{const all=!Object.values(selected).every(Boolean);const s={};preview.forEach(it=>s[it.id]=all);setSelected(s)}}>
              ${Object.values(selected).every(Boolean)?'Deselec. todo':'Selec. todo'}
            </button>
          </div>
          ${preview.map(it=>html`
            <div class="card" style="margin-bottom:8px;opacity:${selected[it.id]?1:.4};border:2px solid ${selected[it.id]?'var(--g)':'var(--sep)'}" onClick=${()=>setSelected(s=>({...s,[it.id]:!s[it.id]}))}>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="font-size:22px">${selected[it.id]?'✅':'⬜'}</div>
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.description}</div>
                  <div style="font-size:12px;color:var(--t3)">${CATL[it.category]??'📦'} ${it.category} · ${fdate(it.date)}</div>
                </div>
                <div style="font-weight:800;color:var(--r);font-size:15px;white-space:nowrap">${clp(it.amount)}</div>
              </div>
